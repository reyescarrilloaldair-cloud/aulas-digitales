<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transformadores Digitales ADM</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }
.container { max-width: 900px; margin: 0 auto; padding: 20px; }
.header { background: linear-gradient(135deg, #534AB7, #185FA5); color: white; padding: 30px; border-radius: 12px; text-align: center; margin-bottom: 30px; }
.header h1 { font-size: 32px; margin-bottom: 10px; }
.header p { font-size: 16px; opacity: 0.9; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin: 30px 0; }
.stat-card { background: white; padding: 20px; border-radius: 8px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.stat-card .number { font-size: 28px; font-weight: bold; color: #534AB7; }
.stat-card .label { font-size: 14px; color: #666; margin-top: 5px; }
.section { background: white; padding: 25px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.section h2 { color: #534AB7; margin-bottom: 15px; font-size: 22px; border-bottom: 2px solid #534AB7; padding-bottom: 10px; }
.tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #ddd; }
.tab { padding: 10px 20px; background: none; border: none; cursor: pointer; color: #666; font-size: 14px; border-bottom: 3px solid transparent; }
.tab.active { color: #534AB7; border-bottom-color: #534AB7; font-weight: bold; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.btn { padding: 10px 20px; margin: 8px 4px 8px 0; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.3s; }
.btn-primary { background: #534AB7; color: white; }
.btn-primary:hover { background: #3d3580; transform: translateY(-2px); }
.btn-outline { background: white; border: 2px solid #534AB7; color: #534AB7; }
.btn-outline:hover { background: #f5f5f5; }
.mission-item { background: #f9f9f9; padding: 15px; border-radius: 6px; margin: 10px 0; border-left: 4px solid #185FA5; cursor: pointer; transition: all 0.3s; }
.mission-item:hover { background: #f0f0f0; transform: translateX(5px); }
.mission-item.completed { background: #e8f5e9; border-left-color: #4caf50; }
.mission-item .title { font-weight: bold; color: #333; }
.mission-item .xp { float: right; background: #534AB7; color: white; padding: 4px 10px; border-radius: 20px; font-size: 12px; }
.mission-item.completed .xp { background: #4caf50; }
.level-item { display: flex; align-items: center; padding: 12px; margin: 10px 0; background: #f5f5f5; border-radius: 6px; }
.level-number { background: #534AB7; color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 15px; }
.level-info { flex: 1; }
.level-name { font-weight: bold; color: #333; }
.level-range { font-size: 12px; color: #666; }
.xp-bar { background: #ddd; height: 20px; border-radius: 10px; margin-top: 5px; overflow: hidden; }
.xp-fill { height: 100%; background: linear-gradient(90deg, #534AB7, #185FA5); transition: width 0.5s; }
.quiz-question { background: #f5f5f5; padding: 20px; border-radius: 8px; margin: 20px 0; }
.quiz-option { display: block; width: 100%; text-align: left; padding: 12px; margin: 8px 0; background: white; border: 2px solid #ddd; border-radius: 6px; cursor: pointer; transition: all 0.3s; }
.quiz-option:hover { border-color: #534AB7; background: #f5f5f5; }
.quiz-option.correct { background: #e8f5e9; border-color: #4caf50; }
.quiz-option.wrong { background: #ffebee; border-color: #f44336; }
.badge-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 15px; }
.badge { text-align: center; padding: 15px; background: #f5f5f5; border-radius: 8px; opacity: 0.5; transition: all 0.3s; }
.badge.unlocked { background: linear-gradient(135deg, #534AB7, #185FA5); color: white; opacity: 1; }
.badge-icon { font-size: 40px; margin-bottom: 8px; }
.badge-name { font-weight: bold; font-size: 12px; margin-bottom: 4px; }
.badge-desc { font-size: 11px; opacity: 0.8; }
.xp-display { background: #534AB7; color: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
.xp-display .label { font-size: 12px; opacity: 0.9; }
.xp-display .value { font-size: 24px; font-weight: bold; }
.feedback { padding: 12px; border-radius: 6px; margin: 10px 0; display: none; }
.feedback.show { display: block; }
.feedback.ok { background: #e8f5e9; color: #2e7d32; border-left: 4px solid #4caf50; }
.feedback.error { background: #ffebee; color: #c62828; border-left: 4px solid #f44336; }
.nav-bottom { display: flex; gap: 10px; margin-top: 30px; flex-wrap: wrap; justify-content: center; }
.progress-item { margin: 15px 0; }
.progress-item .label { font-size: 12px; color: #666; margin-bottom: 5px; }
.progress-bar { background: #ddd; height: 8px; border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; background: #534AB7; width: 0%; transition: width 0.3s; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🚀 Transformadores Digitales ADM</h1>
    <p>Misión educativa interactiva con gamificación</p>
  </div>

  <div class="xp-display">
    <div class="label">Progreso Total</div>
    <div class="value" id="xp-value">0 / 2400 XP</div>
    <div class="progress-item" style="margin-top: 10px;">
      <div class="progress-bar">
        <div class="progress-fill" id="xp-bar" style="width: 0%"></div>
      </div>
    </div>
    <div style="margin-top: 10px; font-size: 14px;" id="level-value">Nivel 1: Explorador Digital</div>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="number">5</div>
      <div class="label">Misiones</div>
    </div>
    <div class="stat-card">
      <div class="number">5</div>
      <div class="label">Niveles</div>
    </div>
    <div class="stat-card">
      <div class="number">8</div>
      <div class="label">Insignias</div>
    </div>
    <div class="stat-card">
      <div class="number">2400</div>
      <div class="label">XP Máx</div>
    </div>
  </div>

  <div id="feedback" class="feedback"></div>

  <!-- MISIONES -->
  <div class="section">
    <h2>📋 Misiones</h2>
    <div id="missions-list"></div>
  </div>

  <!-- NIVELES -->
  <div class="section">
    <h2>📊 Niveles</h2>
    <div id="levels-list"></div>
  </div>

  <!-- QUIZ -->
  <div class="section">
    <h2>❓ Quiz</h2>
    <button class="btn btn-primary" onclick="startQuiz()">Iniciar Quiz</button>
    <div id="quiz-container"></div>
  </div>

  <!-- INSIGNIAS -->
  <div class="section">
    <h2>🏆 Insignias Desbloqueadas</h2>
    <div class="badge-container" id="badges-list"></div>
  </div>

  <div class="nav-bottom">
    <button class="btn btn-primary" onclick="location.reload()">Recargar</button>
    <button class="btn btn-outline" onclick="resetGame()">Reiniciar Progreso</button>
  </div>
</div>

<script>
// ====== DATOS DEL JUEGO ======
const gameState = {
  xp: 0,
  level: 1,
  missionsCompleted: [],
  quizScore: 0,
  selectedRole: null
};

const missions = [
  { id: 'm1', icon: '🧭', title: 'Primer contacto ADM', desc: 'Aprende qué son las Aulas Digitales Multipropósito', xp: 100 },
  { id: 'm2', icon: '🎭', title: 'Elige tu rol', desc: 'Selecciona tu rol en la comunidad ADM', xp: 80 },
  { id: 'm3', icon: '💡', title: 'Diseña una clase digital', desc: 'Crea un plan de clase con herramientas digitales', xp: 150 },
  { id: 'm4', icon: '🔐', title: 'Escape Room educativo', desc: 'Resuelve el reto de transformación digital', xp: 200 },
  { id: 'm5', icon: '🚀', title: 'Proyecto de innovación', desc: 'Diseña un proyecto que resuelva un problema real', xp: 250 }
];

const levels = [
  { num: 1, name: 'Explorador Digital', min: 0, max: 200 },
  { num: 2, name: 'Facilitador Tecnológico', min: 201, max: 600 },
  { num: 3, name: 'Innovador Educativo', min: 601, max: 1100 },
  { num: 4, name: 'Líder ADM', min: 1101, max: 1800 },
  { num: 5, name: 'Maestro de Transformación', min: 1801, max: 2400 }
];

const badges = [
  { id: 'b1', icon: '🔭', name: 'Primera Exploración', desc: 'Completa misión 1', check: () => gameState.missionsCompleted.includes('m1') },
  { id: 'b2', icon: '🎭', name: 'Rol Desbloqueado', desc: 'Elige tu rol', check: () => gameState.selectedRole !== null },
  { id: 'b3', icon: '💡', name: 'Diseñador Digital', desc: 'Crea tu clase', check: () => gameState.missionsCompleted.includes('m3') },
  { id: 'b4', icon: '🔐', name: 'Escapista', desc: 'Supera escape room', check: () => gameState.missionsCompleted.includes('m4') },
  { id: 'b5', icon: '🚀', name: 'Innovador', desc: 'Presenta proyecto', check: () => gameState.missionsCompleted.includes('m5') },
  { id: 'b6', icon: '👑', name: 'Líder ADM', desc: 'Nivel 4', check: () => gameState.level >= 4 },
  { id: 'b7', icon: '🏆', name: 'Maestro', desc: 'Todas misiones', check: () => gameState.missionsCompleted.length === 5 },
  { id: 'b8', icon: '🎯', name: 'Quiz Master', desc: '5/5 en quiz', check: () => gameState.quizScore === 5 }
];

const quizData = [
  { q: '¿Qué significa ADM?', opts: ['Aula Digital Multipropósito', 'Ambiente Digital Media', 'Asistente Docente Móvil'], correct: 0 },
  { q: '¿Cuál es la primera fase de ADM?', opts: ['Evaluación', 'Planeación pedagógica', 'Integración'], correct: 1 },
  { q: '¿Qué competencia potencia ADM?', opts: ['Memorización', 'Trabajo en equipo', 'Lectura rápida'], correct: 1 },
  { q: '¿Beneficio de ADM vs aula tradicional?', opts: ['Menos recursos', 'Personalización e interactividad', 'Sin docentes'], correct: 1 },
  { q: '¿Qué rol desbloquea "Arquitecto de infraestructura"?', opts: ['Estudiante', 'Directivo', 'Técnico TI'], correct: 2 }
];

// ====== FUNCIONES DE ALMACENAMIENTO ======
function saveGame() {
  localStorage.setItem('adm-game', JSON.stringify(gameState));
}

function loadGame() {
  const saved = localStorage.getItem('adm-game');
  if (saved) Object.assign(gameState, JSON.parse(saved));
}

function resetGame() {
  if (confirm('¿Reiniciar todo el progreso?')) {
    localStorage.removeItem('adm-game');
    location.reload();
  }
}

// ====== SISTEMA XP ======
function addXP(amount) {
  const oldLevel = gameState.level;
  gameState.xp = Math.min(gameState.xp + amount, 2400);
  updateLevel();
  saveGame();
  
  if (gameState.level > oldLevel) {
    const levelInfo = levels[gameState.level - 1];
    showFeedback(`¡NIVEL UP! ${levelInfo.name}`, 'ok');
  } else {
    showFeedback(`+${amount} XP`, 'ok');
  }
  
  updateUI();
}

function updateLevel() {
  for (let i = levels.length - 1; i >= 0; i--) {
    if (gameState.xp >= levels[i].min) {
      gameState.level = i + 1;
      break;
    }
  }
}

// ====== INTERFAZ ======
function updateUI() {
  const levelInfo = levels[gameState.level - 1];
  const xpPercent = (gameState.xp / 2400) * 100;
  
  document.getElementById('xp-value').textContent = `${gameState.xp} / 2400 XP`;
  document.getElementById('xp-bar').style.width = xpPercent + '%';
  document.getElementById('level-value').textContent = `Nivel ${gameState.level}: ${levelInfo.name}`;
  
  renderMissions();
  renderLevels();
  renderBadges();
}

function renderMissions() {
  const html = missions.map(m => `
    <div class="mission-item ${gameState.missionsCompleted.includes(m.id) ? 'completed' : ''}" 
         onclick="completeMission('${m.id}')">
      <div class="title">${m.icon} ${m.title}</div>
      <div>${m.desc}</div>
      <span class="xp">${gameState.missionsCompleted.includes(m.id) ? '✓' : `+${m.xp} XP`}</span>
    </div>
  `).join('');
  document.getElementById('missions-list').innerHTML = html;
}

function renderLevels() {
  const html = levels.map(lv => {
    const isActive = gameState.level === lv.num;
    return `
    <div class="level-item" style="background: ${isActive ? '#e3e0f7' : '#f5f5f5'};">
      <div class="level-number">${lv.num}</div>
      <div class="level-info">
        <div class="level-name">${lv.name}</div>
        <div class="level-range">${lv.min} - ${lv.max} XP</div>
      </div>
    </div>
    `;
  }).join('');
  document.getElementById('levels-list').innerHTML = html;
}

function renderBadges() {
  const html = badges.map(b => `
    <div class="badge ${b.check() ? 'unlocked' : ''}">
      <div class="badge-icon">${b.icon}</div>
      <div class="badge-name">${b.name}</div>
      <div class="badge-desc">${b.desc}</div>
    </div>
  `).join('');
  document.getElementById('badges-list').innerHTML = html;
}

function completeMission(missionId) {
  if (gameState.missionsCompleted.includes(missionId)) {
    showFeedback('Ya completaste esta misión', 'error');
    return;
  }
  
  const mission = missions.find(m => m.id === missionId);
  gameState.missionsCompleted.push(missionId);
  addXP(mission.xp);
  saveGame();
}

function showFeedback(msg, type) {
  const fb = document.getElementById('feedback');
  fb.textContent = msg;
  fb.className = `feedback ${type} show`;
  setTimeout(() => fb.classList.remove('show'), 3000);
}

// ====== QUIZ ======
let quizIndex = 0;
let quizScore = 0;

function startQuiz() {
  quizIndex = 0;
  quizScore = 0;
  renderQuizQuestion();
}

function renderQuizQuestion() {
  const container = document.getElementById('quiz-container');
  
  if (quizIndex >= quizData.length) {
    container.innerHTML = `
      <div style="text-align: center; padding: 30px;">
        <div style="font-size: 48px; margin-bottom: 15px;">🎉</div>
        <div style="font-size: 24px; font-weight: bold; margin-bottom: 10px;">Quiz Completado</div>
        <div style="font-size: 32px; color: #534AB7; font-weight: bold; margin: 20px 0;">${quizScore} / ${quizData.length}</div>
        <button class="btn btn-primary" onclick="startQuiz()">Intentar de nuevo</button>
      </div>
    `;
    gameState.quizScore = quizScore;
    if (quizScore === 5) addXP(250);
    else addXP(quizScore * 50);
    return;
  }
  
  const q = quizData[quizIndex];
  const progress = Math.round(((quizIndex) / quizData.length) * 100);
  
  container.innerHTML = `
    <div class="progress-item">
      <div class="label">Pregunta ${quizIndex + 1} / ${quizData.length}</div>
      <div class="progress-bar">
        <div class="progress-fill" style="width: ${progress}%"></div>
      </div>
    </div>
    <div class="quiz-question">
      <div style="font-weight: bold; font-size: 16px; margin-bottom: 15px;">${q.q}</div>
      ${q.opts.map((o, i) => `
        <button class="quiz-option" onclick="answerQuiz(${i}, ${q.correct})">${o}</button>
      `).join('')}
    </div>
  `;
}

function answerQuiz(chosen, correct) {
  if (chosen === correct) {
    quizScore++;
    document.querySelectorAll('.quiz-option')[chosen].classList.add('correct');
  } else {
    document.querySelectorAll('.quiz-option')[chosen].classList.add('wrong');
    document.querySelectorAll('.quiz-option')[correct].classList.add('correct');
  }
  
  document.querySelectorAll('.quiz-option').forEach(o => o.disabled = true);
  
  setTimeout(() => {
    quizIndex++;
    renderQuizQuestion();
  }, 1500);
}

// ====== INICIALIZACIÓN ======
window.addEventListener('load', () => {
  loadGame();
  updateUI();
});
</script>
</body>
</html>
